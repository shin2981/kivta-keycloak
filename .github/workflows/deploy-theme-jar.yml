name: Build and Deploy Keycloak Theme JAR

run-name: >
  ${{ github.event_name == 'workflow_dispatch' && '🛠️ 수동 릴리즈 실행' || '🚀 릴리즈 자동 생성' }}
  #${{ github.run_number }}
  by @${{ github.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Install dependencies
        run: npm ci

      - name: Build Keycloak theme JAR
        run: npm run keycloak:build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-theme-jar
          path: dist_keycloak/keycloak-theme-*.jar
          if-no-files-found: error

  deploy:
    name: Deploy to Keycloak server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: keycloak-theme-jar
          path: ./artifact

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.KEYCLOAK_HOST }}
          username: ${{ secrets.KEYCLOAK_USER }}
          password: ${{ secrets.KEYCLOAK_PASSWORD }}
          port: ${{ secrets.KEYCLOAK_PORT || 22 }}
          source: artifact/keycloak-theme-*.jar
          target: /var/keycloak/providers/
          strip_components: 1

      - name: Restart keycloak container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KEYCLOAK_HOST }}
          username: ${{ secrets.KEYCLOAK_USER }}
          password: ${{ secrets.KEYCLOAK_PASSWORD }}
          port: ${{ secrets.KEYCLOAK_PORT || 22 }}
          script: docker restart keycloak
